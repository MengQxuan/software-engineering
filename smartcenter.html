<!-- smart-center.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能中心</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #e0f7fa;
            font-family: 'Arial', sans-serif;
        }

        #smart-center-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
        }

        .smart-center-box {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 30px;
            width: 80%;
            max-width: 800px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .smart-center-box h2 {
            color: #00796b;
            margin-bottom: 15px;
        }

        .smart-center-box p {
            color: #004d40;
        }
    </style>
</head>

<body>
    <div id="smart-center-container">
        <div class="smart-center-box">
            <h2>智能中心</h2>
            <p>智能中心数据展示区。</p>
        </div>
    </div>
</body>

</html>
