<!-- main.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧海洋牧场可视化系统 - 主页面</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #e0f7fa;
            font-family: 'Arial', sans-serif;
        }

        #main-container {
            display: flex;
            height: 100vh;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
        }

        #sidebar {
            width: 250px;
            background-color: rgba(0, 121, 107, 0.9);
            padding: 20px;
            box-shadow: 5px 0px 15px rgba(0, 0, 0, 0.1);
        }

        #sidebar ul {
            list-style-type: none;
            padding: 0;
        }

        #sidebar li {
            margin-bottom: 15px;
        }

        #sidebar a {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s;
        }

        #sidebar a:hover {
            color: #b2dfdb;
        }

        #content {
            flex: 1;
            padding: 30px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            margin: 20px;
        }
    </style>
</head>

<body>
    <div id="main-container">
        <nav id="sidebar">
            <h2 style="color: #ffffff;">导航菜单</h2>
            <ul>
                <li><a href="info.html">主要信息</a></li>
                <li><a href="underwater.html">水下系统</a></li>
                <li><a href="smartcenter.html">智能中心</a></li>
                <li><a href="admin.html">管理员界面</a></li>
            </ul>
        </nav>

        <div id="content">
            <h2>欢迎来到智慧海洋牧场系统</h2>
            <p>请选择左侧菜单中的功能查看详细内容。</p>
        </div>
    </div>
</body>

</html>
